name: Telegram Ad Poster

on:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: '*/10 * * * *'  # Runs every 10 minutes as a fallback safety net
  workflow_dispatch:        # Allows manual triggering from the Actions tab

# Prevent multiple workflow runs from running at the same time and conflicting
concurrency:
  group: telegram-ad-bot
  cancel-in-progress: true

permissions:
  contents: write           # Required to commit state.json back to the repository
  actions: write            # Required to dispatch the next run automatically

jobs:
  post-ads:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Ad Poster (Continuous Loop Mode)
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          RUN_DURATION_MINUTES: "350"  # Run for 5 hours and 50 minutes, then restart gracefully
        run: |
          python post_ads.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add state.json ads_config.json
          # Commit and push only if state or ads were modified
          if ! git diff --cached --quiet; then
            git commit -m "Update bot state and ads configurations [skip ci]"
            git push
          else
            echo "No changes to state or configurations to commit."
          fi

      - name: Trigger next run (Continuous 24/7 loop)
        if: always()        # Ensures the next loop starts even if this one had errors
        run: |
          echo "Triggering next 5h 50m loop cycle..."
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/ad-bot.yml/dispatches \
            -d '{"ref":"${{ github.ref }}"}' || echo "Self-dispatch not permitted or failed. Standard Cron fallback will trigger."

