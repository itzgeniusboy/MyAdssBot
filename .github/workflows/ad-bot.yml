name: Telegram Ad Poster

on:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: '*/10 * * * *'  # Runs every 10 minutes
  workflow_dispatch:        # Allows manual triggering from the Actions tab

permissions:
  contents: write           # Required to commit state.json back to the repository

jobs:
  post-ads:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Ad Poster
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          python post_ads.py

      - name: Commit and push state changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add state.json
          # Commit and push only if state.json was modified to prevent action errors on unchanged runs
          if ! git diff --cached --quiet; then
            git commit -m "Update state.json with latest ad post times [skip ci]"
            git push
          else
            echo "No changes to state.json to commit."
          fi
